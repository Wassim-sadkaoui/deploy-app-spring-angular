events{}

http {

    include /etc/nginx/mime.types;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API calls to Spring Boot service inside the Docker network.
        # Handle CORS preflight at the proxy level to avoid backend OPTIONS 403
        location /api/ {
            # Respond to preflight requests directly from nginx
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:4200';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }

            # Forward non-OPTIONS requests to backend (strip /api/)
            # Remove Origin header so backend doesn't see cross-origin requests and return 403
            proxy_set_header Origin "";
            proxy_pass http://spring-boot-app:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Serve Angular app; fallback to index.html for client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
